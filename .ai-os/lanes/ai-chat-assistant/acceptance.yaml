risks:
  - "Gemini 3 Pro 首 token 延迟由上游 Gemini CLI / 模型决定；应用侧只能提供等待态和真实 delta 队列渲染，不能让上游更早产出 token。"
  - "Gemini CLI stream-json 的输出结构可能随上游 CLI 版本变化；本次修复需覆盖字符串 content 与 content parts 两种格式，并在无法解析正文时给出显式错误。"
  - "真实 provider 输出结构化 JSON 的稳定性仍依赖模型；当前实现改为宽松提取 JSON，但仍可能遇到完全不可恢复的脏输出"
  - "需要后续人工体验验证 AI 面板在不同窗口尺寸下与底部沙盘 / 伏笔提醒的相对位置，以及拖动/缩放后的观感"
  - "旧 project_config AI 字段仍保留为兼容 fallback；若后续彻底移除需单独做迁移与回滚评估"
